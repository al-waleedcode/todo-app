<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق إدارة المهام</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">قائمة مهامي 📝</h1>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="taskInput" placeholder="أضف مهمة جديدة..." 
                class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="addTask()" 
                class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">إضافة</button>
        </div>

        <ul id="taskList" class="space-y-3">
            </ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
